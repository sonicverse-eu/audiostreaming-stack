worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # HLS MIME types
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }

    # HTTP server
    server {
        listen 80;
        server_name $ICECAST_HOSTNAME;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Root — simple status page
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><title>$ICECAST_HOSTNAME</title></head><body><h1>Stream Online</h1><p>Endpoints: <a href="/listen/stream-mp3-128">/listen/stream-mp3-128</a> | <a href="/hls/live.m3u8">/hls/live.m3u8</a></p></body></html>';
        }

        # When SSL is not available, serve content directly on HTTP
        location /hls/ {
            alias /hls/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            if ($request_method = OPTIONS) { return 204; }
        }

        location /listen/ {
            proxy_pass http://icecast:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/ {
            proxy_pass http://status-panel:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /icecast-admin/ {
            proxy_pass http://icecast:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

# HTTPS_START
    # HTTPS server — only included when SSL certificate exists
    server {
        listen 443 ssl;
        http2 on;
        server_name $ICECAST_HOSTNAME;

        ssl_certificate /etc/letsencrypt/live/$ICECAST_HOSTNAME/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$ICECAST_HOSTNAME/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Root — simple status page
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><title>$ICECAST_HOSTNAME</title></head><body><h1>Stream Online</h1><p>Endpoints: <a href="/listen/stream-mp3-128">/listen/stream-mp3-128</a> | <a href="/hls/live.m3u8">/hls/live.m3u8</a></p></body></html>';
        }

        # HLS streaming endpoint
        location /hls/ {
            alias /hls/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            if ($request_method = OPTIONS) { return 204; }
        }

        # Reverse proxy to Icecast streams
        location /listen/ {
            proxy_pass http://icecast:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Status panel API
        location /api/ {
            proxy_pass http://status-panel:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Icecast admin panel
        location /icecast-admin/ {
            proxy_pass http://icecast:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
# HTTPS_END
}
