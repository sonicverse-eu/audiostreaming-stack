worker_processes auto;
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 1g;
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    # CORS for /api/ routes is handled by Flask-CORS in the status-api container.

    # HLS MIME types
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }

    # HTTP server
    server {
        listen 80;
        server_name $ICECAST_HOSTNAME;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Root — branded status page
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Public media endpoints remain available on HTTP for bootstrap/compatibility.
        location /hls/ {
            alias /hls/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Robots-Tag "noindex, nofollow" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        location /listen/ {
            proxy_pass http://icecast:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header X-Robots-Tag "noindex, nofollow" always;
        }

        # STATUS_API_START
        # Sensitive operator endpoints are HTTPS-only.
        location /api/ {
            return 308 https://$host$request_uri;
        }
        # STATUS_API_END

        location /icecast-admin/ {
            return 308 https://$host$request_uri;
        }
    }

# HTTPS_START
    # HTTPS server — only included when SSL certificate exists
    server {
        listen 443 ssl;
        http2 on;
        server_name $ICECAST_HOSTNAME;

        ssl_certificate /etc/letsencrypt/live/$ICECAST_HOSTNAME/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$ICECAST_HOSTNAME/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Root — branded status page
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # HLS streaming endpoint
        location /hls/ {
            alias /hls/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header X-Robots-Tag "noindex, nofollow" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # Reverse proxy to Icecast streams
        location /listen/ {
            proxy_pass http://icecast:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header X-Robots-Tag "noindex, nofollow" always;
        }

        # STATUS_API_START
        # Internal alert ingestion endpoint (restricted before proxying)
        location = /api/alert {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://status-api:8080/api/alert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Alert "1";
        }

        # Status panel API
        location /api/ {
            proxy_pass http://status-api:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Alert "";
        }
        # STATUS_API_END

        # Icecast admin panel
        location /icecast-admin/ {
            proxy_pass http://icecast:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
# HTTPS_END
}
