name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_NAMESPACE: sonicverse
  GHCR_IMAGE_BASE: ghcr.io/sonicverse-eu/audiostreaming-stack

jobs:
  changes:
    name: Detect changed services
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      docs_only: ${{ steps.docs_only.outputs.value }}
      affects_all: ${{ steps.filter.outputs.affects_all }}
      icecast: ${{ steps.filter.outputs.icecast }}
      liquidsoap: ${{ steps.filter.outputs.liquidsoap }}
      nginx: ${{ steps.filter.outputs.nginx }}
      status_api: ${{ steps.filter.outputs.status_api }}
      analytics: ${{ steps.filter.outputs.analytics }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            affects_all:
              - 'docker-compose.yml'
            icecast:
              - 'services/streaming/icecast/**'
            liquidsoap:
              - 'services/streaming/liquidsoap/**'
            nginx:
              - 'infrastructure/nginx/**'
            status_api:
              - 'apps/status-api/**'
            analytics:
              - 'services/analytics/**'

      - name: Compute docs-only change flag
        id: docs_only
        run: |
          set -e
          docs_only=false
          if [[ "${{ steps.filter.outputs.docs }}" == 'true' && \
                "${{ steps.filter.outputs.affects_all }}" == 'false' && \
                "${{ steps.filter.outputs.icecast }}" == 'false' && \
                "${{ steps.filter.outputs.liquidsoap }}" == 'false' && \
                "${{ steps.filter.outputs.nginx }}" == 'false' && \
                    "${{ steps.filter.outputs.status_api }}" == 'false' && \
                "${{ steps.filter.outputs.analytics }}" == 'false' ]]; then
                docs_only=true
          fi
          echo "value=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Summarize detected services
        run: |
          echo "docs_only=${{ steps.docs_only.outputs.value }}"
          echo "affects_all=${{ steps.filter.outputs.affects_all }}"
          echo "icecast=${{ steps.filter.outputs.icecast }}"
          echo "liquidsoap=${{ steps.filter.outputs.liquidsoap }}"
          echo "nginx=${{ steps.filter.outputs.nginx }}"
          echo "status_api=${{ steps.filter.outputs.status_api }}"
          echo "analytics=${{ steps.filter.outputs.analytics }}"

  build:
    name: Build ${{ matrix.service.name }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: icecast
            context: ./services/streaming/icecast
          - name: liquidsoap
            context: ./services/streaming/liquidsoap
            # Liquidsoap arm64 support depends on the base image — disable if unavailable
            platforms: linux/amd64,linux/arm64
          - name: nginx
            context: ./infrastructure/nginx
          - name: status-api
            context: ./apps/status-api
            # Mounts the Docker socket at runtime — only meaningful on amd64 hosts
            platforms: linux/amd64
          - name: analytics
            context: ./services/analytics

    steps:
      - name: Decide whether this matrix item should build
        id: should_build
        run: |
          set -e
          should_build=false

          if [[ "${{ github.event_name }}" != 'pull_request' || \
                "${{ needs.changes.outputs.affects_all }}" == 'true' ]]; then
            should_build=true
          else
            case "${{ matrix.service.name }}" in
              icecast)
                [[ "${{ needs.changes.outputs.icecast }}" == 'true' ]] && should_build=true
                ;;
              liquidsoap)
                [[ "${{ needs.changes.outputs.liquidsoap }}" == 'true' ]] && should_build=true
                ;;
              nginx)
                [[ "${{ needs.changes.outputs.nginx }}" == 'true' ]] && should_build=true
                ;;
              status-api)
                [[ "${{ needs.changes.outputs.status_api }}" == 'true' ]] && should_build=true
                ;;
              analytics)
                [[ "${{ needs.changes.outputs.analytics }}" == 'true' ]] && should_build=true
                ;;
            esac
          fi

          echo "value=$should_build" >> "$GITHUB_OUTPUT"
          echo "should_build=$should_build"

      - name: Checkout
        if: steps.should_build.outputs.value == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.should_build.outputs.value == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Setup Blacksmith Builder
        if: steps.should_build.outputs.value == 'true'
        uses: useblacksmith/setup-docker-builder@v1

      - name: Validate Docker Hub credentials
        if: github.event_name != 'pull_request' && steps.should_build.outputs.value == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -e
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "Missing Docker Hub credentials: set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets." >&2
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && steps.should_build.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.should_build.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.should_build.outputs.value == 'true'
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE_BASE }}/${{ matrix.service.name }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/audiostreaming-stack-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: steps.should_build.outputs.value == 'true'
        id: build_push
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ matrix.service.context }}
          platforms: ${{ matrix.service.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify GHCR and Docker Hub digests match
        if: github.event_name != 'pull_request' && steps.should_build.outputs.value == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_NAMESPACE }}
        run: |
          set -e
          short_sha="${GITHUB_SHA::7}"
          ghcr_ref="${{ env.GHCR_IMAGE_BASE }}/${{ matrix.service.name }}:sha-${short_sha}"
          dockerhub_ref="docker.io/${DOCKERHUB_USERNAME}/audiostreaming-stack-${{ matrix.service.name }}"
          dockerhub_ref="${dockerhub_ref}:sha-${short_sha}"

          ghcr_digest="$(docker buildx imagetools inspect "$ghcr_ref" --format '{{.Manifest.Digest}}')"
          dockerhub_digest="$(docker buildx imagetools inspect "$dockerhub_ref" --format '{{.Manifest.Digest}}')"

          echo "GHCR digest:      $ghcr_digest"
          echo "Docker Hub digest: $dockerhub_digest"

          if [[ "$ghcr_digest" != "$dockerhub_digest" ]]; then
            echo "Digest mismatch between GHCR and Docker Hub for ${{ matrix.service.name }}" >&2
            exit 1
          fi

      - name: Skip unchanged service on PR
        if: github.event_name == 'pull_request' && steps.should_build.outputs.value != 'true'
        run: echo "No relevant changes for ${{ matrix.service.name }} in this PR. Skipping build."

  docs-only:
    name: Docs-only PR optimization
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
    steps:
      - run: echo "Documentation-only PR detected. Skipping Docker build matrix."
