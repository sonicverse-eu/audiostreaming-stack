name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: docker.io/sonicverse/audiostreaming-stack
  GHCR_IMAGE: ghcr.io/sonicverse-eu/audiostreaming-stack
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  changes:
    name: Detect changed runtime files
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.docs_only.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            runtime:
              - '.dockerignore'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/docker-build-push.yml'
              - 'apps/status-api/**'
              - 'services/analytics/**'
              - 'services/streaming/**'
              - 'infrastructure/nginx/**'
              - 'scripts/unified-entrypoint.sh'

      - name: Compute docs-only change flag
        id: docs_only
        run: |
          set -euo pipefail
          docs_only=false
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && \
                "${{ steps.filter.outputs.runtime }}" == "false" ]]; then
              docs_only=true
          fi
          echo "value=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Summarize detected changes
        run: |
          echo "docs=${{ steps.filter.outputs.docs }}"
          echo "runtime=${{ steps.filter.outputs.runtime }}"
          echo "docs_only=${{ steps.docs_only.outputs.value }}"

  build:
    name: Build unified image
    runs-on: ubuntu-24.04
    needs: changes
    if: >-
      (github.event_name == 'pull_request' && needs.changes.outputs.docs_only != 'true') ||
      (github.event_name == 'push')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        if: github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
              echo "Missing Docker Hub credentials: set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets." >&2
              exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
