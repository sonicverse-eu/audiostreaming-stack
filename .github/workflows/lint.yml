name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      yaml: ${{ steps.filter.outputs.yaml }}
      docs_only: ${{ steps.docs_only.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            python:
              - 'analytics/**/*.py'
              - 'status-panel/**/*.py'
              - 'analytics/requirements.txt'
              - 'status-panel/requirements.txt'
              - 'pyproject.toml'
            typescript:
              - 'status-dashboard/**/*.ts'
              - 'status-dashboard/**/*.tsx'
              - 'status-dashboard/**/*.js'
              - 'status-dashboard/**/*.mjs'
              - 'status-dashboard/**/*.cjs'
              - 'status-dashboard/.eslintrc.json'
              - 'status-dashboard/.eslintignore'
              - 'status-dashboard/eslint.config.js'
              - 'status-dashboard/eslint.config.mjs'
              - 'status-dashboard/eslint.config.cjs'
              - 'status-dashboard/.prettierrc'
              - 'status-dashboard/.prettierrc.json'
              - 'status-dashboard/.prettierrc.yml'
              - 'status-dashboard/.prettierrc.yaml'
              - 'status-dashboard/.prettierrc.js'
              - 'status-dashboard/.prettierrc.mjs'
              - 'status-dashboard/.prettierrc.cjs'
              - 'status-dashboard/prettier.config.js'
              - 'status-dashboard/prettier.config.mjs'
              - 'status-dashboard/prettier.config.cjs'
              - 'status-dashboard/package.json'
              - 'status-dashboard/package-lock.json'
              - 'status-dashboard/pnpm-lock.yaml'
              - 'status-dashboard/yarn.lock'
              - 'status-dashboard/tsconfig.json'
              - 'status-dashboard/next.config.ts'
              - 'status-dashboard/postcss.config.mjs'
            dockerfiles:
              - '**/Dockerfile'
              - 'docker-compose.yml'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'

      - name: Compute docs-only change flag
        id: docs_only
        run: |
          docs_only=false
          if [[ "${{ steps.filter.outputs.docs }}" == 'true' && \
                "${{ steps.filter.outputs.python }}" == 'false' && \
                "${{ steps.filter.outputs.typescript }}" == 'false' && \
                "${{ steps.filter.outputs.dockerfiles }}" == 'false' && \
                "${{ steps.filter.outputs.yaml }}" == 'false' ]]; then
            docs_only=true
          fi
          echo "value=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Summarize detected changes
        run: |
          echo "docs=${{ steps.filter.outputs.docs }}"
          echo "python=${{ steps.filter.outputs.python }}"
          echo "typescript=${{ steps.filter.outputs.typescript }}"
          echo "dockerfiles=${{ steps.filter.outputs.dockerfiles }}"
          echo "yaml=${{ steps.filter.outputs.yaml }}"
          echo "docs_only=${{ steps.docs_only.outputs.value }}"

  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check analytics/ status-panel/"

  typescript:
    name: TypeScript (ESLint)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.typescript == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: status-dashboard
      - run: npm run lint
        working-directory: status-dashboard

  dockerfiles:
    name: Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.dockerfiles == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3002,DL3008,DL3009

  yaml:
    name: YAML (yamllint)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: |
          set -e
          git ls-files '*.yml' '*.yaml' | xargs -r yamllint -c .yamllint.yml

  docs-only:
    name: Docs-only PR optimization
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
    steps:
      - run: echo "Documentation-only PR detected. Skipping code-related lint jobs."
