name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed components
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      yaml: ${{ steps.filter.outputs.yaml }}
      docs_only: ${{ steps.docs_only.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            python:
              - 'services/analytics/**/*.py'
              - 'apps/status-api/**/*.py'
              - 'services/analytics/requirements.txt'
              - 'apps/status-api/requirements.txt'
              - 'pyproject.toml'
            typescript:
              - 'apps/dashboard/**/*.ts'
              - 'apps/dashboard/**/*.tsx'
              - 'apps/dashboard/**/*.js'
              - 'apps/dashboard/**/*.mjs'
              - 'apps/dashboard/**/*.cjs'
              - 'apps/dashboard/.eslintrc.json'
              - 'apps/dashboard/.eslintignore'
              - 'apps/dashboard/eslint.config.js'
              - 'apps/dashboard/eslint.config.mjs'
              - 'apps/dashboard/eslint.config.cjs'
              - 'apps/dashboard/.prettierrc'
              - 'apps/dashboard/.prettierrc.json'
              - 'apps/dashboard/.prettierrc.yml'
              - 'apps/dashboard/.prettierrc.yaml'
              - 'apps/dashboard/.prettierrc.js'
              - 'apps/dashboard/.prettierrc.mjs'
              - 'apps/dashboard/.prettierrc.cjs'
              - 'apps/dashboard/prettier.config.js'
              - 'apps/dashboard/prettier.config.mjs'
              - 'apps/dashboard/prettier.config.cjs'
              - 'apps/dashboard/package.json'
              - 'apps/dashboard/package-lock.json'
              - 'apps/dashboard/pnpm-lock.yaml'
              - 'apps/dashboard/yarn.lock'
              - 'apps/dashboard/tsconfig.json'
              - 'apps/dashboard/next.config.ts'
              - 'apps/dashboard/postcss.config.mjs'
            dockerfiles:
              - '**/Dockerfile'
              - 'docker-compose.yml'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'

      - name: Compute docs-only change flag
        id: docs_only
        run: |
          docs_only=false
          if [[ "${{ steps.filter.outputs.docs }}" == 'true' && \
                "${{ steps.filter.outputs.python }}" == 'false' && \
                "${{ steps.filter.outputs.typescript }}" == 'false' && \
                "${{ steps.filter.outputs.dockerfiles }}" == 'false' && \
                "${{ steps.filter.outputs.yaml }}" == 'false' ]]; then
            docs_only=true
          fi
          echo "value=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Summarize detected changes
        run: |
          echo "docs=${{ steps.filter.outputs.docs }}"
          echo "python=${{ steps.filter.outputs.python }}"
          echo "typescript=${{ steps.filter.outputs.typescript }}"
          echo "dockerfiles=${{ steps.filter.outputs.dockerfiles }}"
          echo "yaml=${{ steps.filter.outputs.yaml }}"
          echo "docs_only=${{ steps.docs_only.outputs.value }}"

  python:
    name: Python (ruff)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3
        with:
          args: "check services/analytics/ apps/status-api/"

  typescript:
    name: TypeScript (ESLint)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.typescript == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: apps/dashboard
      - run: npm run lint
        working-directory: apps/dashboard

  dockerfiles:
    name: Dockerfiles (hadolint)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.dockerfiles == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          recursive: true
          ignore: DL3002,DL3008,DL3009

  yaml:
    name: YAML (yamllint)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: |
          set -e
          git ls-files '*.yml' '*.yaml' | xargs -r yamllint -c .yamllint.yml

  docs-only:
    name: Docs-only PR optimization
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
    steps:
      - run: echo "Documentation-only PR detected. Skipping code-related lint jobs."
