name: Mirror Issue Labels to PRs

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [labeled, unlabeled]

jobs:
  mirror-labels:
    name: Mirror issue labels to connected PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mirror labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Avoid infinite loops caused by automation-triggered label events.
            // Copilot Cloud Agent connects as a GitHub App whose login ends in "[bot]"
            // or matches a "copilot-" prefix, so we guard on both patterns in addition
            // to the standard github-actions[bot] actor.
            function isAutomationActor(login) {
              if (!login) return false;
              return login.endsWith('[bot]') || /^copilot[-_\s]/i.test(login);
            }

            // ── Helper: parse closing-keyword issue references from PR body ─────────
            // Matches: closes/close/closed, fixes/fix/fixed, resolves/resolve/resolved
            // followed by an optional "owner/repo#" or bare "#" and an issue number.
            function parseLinkedIssueNumbers(body) {
              if (!body) return [];
              const pattern =
                /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:[a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+#|#)(\d+)/gi;
              const numbers = [];
              let match;
              while ((match = pattern.exec(body)) !== null) {
                const n = parseInt(match[1], 10);
                if (!numbers.includes(n)) numbers.push(n);
              }
              return numbers;
            }

            // ── Helper: collect issue links from PR metadata/timeline (same repo) ───
            // Covers links created outside plain body keywords, such as GitHub-linked
            // issue references visible on the PR.
            async function getLinkedIssueNumbersForPR(prNumber) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 100) {
                        nodes {
                          number
                          repository {
                            owner { login }
                            name
                          }
                        }
                        pageInfo { hasNextPage }
                      }
                      timelineItems(first: 100, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on Issue {
                                number
                                repository {
                                  owner { login }
                                  name
                                }
                              }
                            }
                          }
                        }
                        pageInfo { hasNextPage }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, { owner, repo, number: prNumber });
              const prData = result.repository.pullRequest;
              const linked = new Set();

              for (const issue of prData.closingIssuesReferences.nodes) {
                if (!issue?.repository) continue;
                if (issue.repository.owner.login === owner && issue.repository.name === repo) {
                  linked.add(issue.number);
                }
              }

              for (const node of prData.timelineItems.nodes) {
                const src = node?.source;
                if (!src || src.__typename !== 'Issue' || !src.repository) continue;
                if (src.repository.owner.login === owner && src.repository.name === repo) {
                  linked.add(src.number);
                }
              }

              if (prData.closingIssuesReferences.pageInfo.hasNextPage) {
                core.warning(
                  `PR #${prNumber} has more than 100 closing issue references; some links may not have been synced.`
                );
              }
              if (prData.timelineItems.pageInfo.hasNextPage) {
                core.warning(
                  `PR #${prNumber} has more than 100 cross-reference events; some links may not have been synced.`
                );
              }

              return Array.from(linked);
            }

            // ── Helper: add missing labels to a PR/issue (no-op if already present) ─
            async function applyMissingLabels(itemNumber, sourceLabels, sourceNumber) {
              if (sourceLabels.length === 0) return;

              const { data: itemData } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: itemNumber,
              });

              const existing = itemData.labels.map(l => l.name);
              const toAdd = sourceLabels.filter(l => !existing.includes(l));

              if (toAdd.length === 0) {
                core.info(`#${itemNumber} already has all labels from #${sourceNumber} – skipping.`);
                return;
              }

              core.info(`Adding [${toAdd.join(', ')}] to #${itemNumber} (mirrored from #${sourceNumber})`);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: itemNumber,
                labels: toAdd,
              });
            }

            // ── Helper: find all PRs connected to an issue via cross-references ──────
            async function getConnectedPRNumbers(issueNumber) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      timelineItems(first: 100, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on PullRequest { number }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, { owner, repo, number: issueNumber });
              const nodes = result.repository.issue.timelineItems.nodes;
              if (nodes.length === 100) {
                core.warning(
                  `Issue #${issueNumber} has exactly 100 cross-reference events returned; ` +
                  'some linked PRs may not have been synced due to API page-size limit.'
                );
              }
              return nodes
                .filter(n => n.source && n.source.__typename === 'PullRequest')
                .map(n => n.source.number);
            }

            // ════════════════════════════════════════════════════════════════════════
            // Branch A: pull_request event — PR was just opened / edited / synced.
            //   Parse the PR body for closing keywords, find linked issues, and copy
            //   all their labels onto the PR.
            // ════════════════════════════════════════════════════════════════════════
            if (context.payload.pull_request) {
              const pr = context.payload.pull_request;
              core.info(`Processing PR #${pr.number} (${context.payload.action})`);

              // Loop protection is only needed for PR-triggered paths in this workflow.
              // We intentionally still process issue labeled/unlabeled events from bots,
              // so labels set by automation can be mirrored issue -> connected PRs.
              if (isAutomationActor(context.actor)) {
                core.info(`PR event triggered by automation actor (${context.actor}) – skipping to prevent loop.`);
                return;
              }

              const bodyLinkedIssueNumbers = parseLinkedIssueNumbers(pr.body);
              const metadataLinkedIssueNumbers = await getLinkedIssueNumbersForPR(pr.number);
              const linkedIssueNumbers = Array.from(
                new Set([...bodyLinkedIssueNumbers, ...metadataLinkedIssueNumbers])
              );

              core.info(
                `Linked issue numbers found for PR: ` +
                (linkedIssueNumbers.length > 0 ? linkedIssueNumbers.join(', ') : 'none')
              );

              if (linkedIssueNumbers.length === 0) {
                core.info('No linked issues – nothing to mirror.');
                return;
              }

              for (const issueNumber of linkedIssueNumbers) {
                let issueData;
                try {
                  ({ data: issueData } = await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: issueNumber,
                  }));
                } catch (err) {
                  core.warning(`Could not fetch issue #${issueNumber}: ${err.message}`);
                  continue;
                }

                // Skip if the reference resolves to a PR rather than a plain issue
                if (issueData.pull_request) {
                  core.info(`#${issueNumber} is a PR, not an issue – skipping.`);
                  continue;
                }

                const issueLabels = issueData.labels.map(l => l.name);
                core.info(`Labels on issue #${issueNumber}: ${issueLabels.join(', ') || 'none'}`);

                await applyMissingLabels(pr.number, issueLabels, issueNumber);
              }
              return;
            }

            // ════════════════════════════════════════════════════════════════════════
            // Branch B: issues labeled/unlabeled event — labels on an issue changed.
            //   Find every PR that references this issue and mirror the full current
            //   label set onto each of them.
            // ════════════════════════════════════════════════════════════════════════
            const issue = context.payload.issue;
            core.info(`Processing issue #${issue.number} (${context.payload.action})`);

            const currentIssueLabels = issue.labels.map(l => l.name);
            core.info(`Current labels on #${issue.number}: ${currentIssueLabels.join(', ') || 'none'}`);

            const connectedPRNumbers = await getConnectedPRNumbers(issue.number);
            core.info(
              `Connected PRs: ` +
              (connectedPRNumbers.length > 0 ? connectedPRNumbers.map(n => `#${n}`).join(', ') : 'none')
            );

            if (connectedPRNumbers.length === 0) {
              core.info('No connected PRs – nothing to mirror.');
              return;
            }

            for (const prNumber of connectedPRNumbers) {
              await applyMissingLabels(prNumber, currentIssueLabels, issue.number);
            }
