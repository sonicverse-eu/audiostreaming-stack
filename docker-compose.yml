services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker.io/sonicverse/audiostreaming-stack:latest
    container_name: sonicverse-app
    env_file:
      - .env
    environment:
      - STATION_NAME=${STATION_NAME:-Radio Station}
      - STATION_LOCATION=${STATION_LOCATION:-Netherlands}
      - STATION_ADMIN_EMAIL=${STATION_ADMIN_EMAIL:-admin@example.com}
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_HOSTNAME=${ICECAST_HOSTNAME}
      - ICECAST_MAX_LISTENERS=${ICECAST_MAX_LISTENERS}
      - ICECAST_URL=http://127.0.0.1:8000
      - ICECAST_INTERNAL_HOST=127.0.0.1
      - HARBOR_PASSWORD=${HARBOR_PASSWORD}
      - HARBOR_PRIMARY_PORT=${HARBOR_PRIMARY_PORT:-8010}
      - HARBOR_FALLBACK_PORT=${HARBOR_FALLBACK_PORT:-8011}
      - SILENCE_THRESHOLD_DB=${SILENCE_THRESHOLD_DB:--40}
      - SILENCE_DURATION=${SILENCE_DURATION:-15}
      - ENABLE_STATUS_PANEL=${ENABLE_STATUS_PANEL:-0}
    ports:
      - "80:80"
      - "443:443"
      - "${HARBOR_PRIMARY_PORT:-8010}:8010"
      - "${HARBOR_FALLBACK_PORT:-8011}:8011"
    volumes:
      - hls-data:/hls
      - icecast-logs:/var/log/icecast2
      - ./stack-config:/etc/sonicverse
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./emergency-audio:/emergency-audio
    networks:
      - streaming
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

  status-api:
    image: docker.io/sonicverse/audiostreaming-stack:latest
    container_name: sonicverse-status-api
    env_file:
      - .env
    environment:
      - STATION_NAME=${STATION_NAME:-Radio Station}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_HOSTNAME=${ICECAST_HOSTNAME}
      - ICECAST_MAX_LISTENERS=${ICECAST_MAX_LISTENERS}
      - ICECAST_URL=http://app:8000
      - HARBOR_PRIMARY_PORT=${HARBOR_PRIMARY_PORT:-8010}
      - HARBOR_FALLBACK_PORT=${HARBOR_FALLBACK_PORT:-8011}
      - SILENCE_THRESHOLD_DB=${SILENCE_THRESHOLD_DB:--40}
      - SILENCE_DURATION=${SILENCE_DURATION:-15}
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_TEAM_ID=${APPWRITE_TEAM_ID}
      - STATUS_PANEL_CORS_ORIGIN=${STATUS_PANEL_CORS_ORIGIN}
      - STATUS_PANEL_HOST=0.0.0.0
      - STATUS_PANEL_WRITE_ROLES=${STATUS_PANEL_WRITE_ROLES:-owner,admin}
      - STATUS_PANEL_ALLOW_RISKY_COMMANDS=${STATUS_PANEL_ALLOW_RISKY_COMMANDS:-0}
      - EMERGENCY_AUDIO_DIR=/emergency-audio
      - STACK_CONFIG_PATH=/etc/sonicverse/stack.json
      - STACK_APPLY_STATUS_PATH=/etc/sonicverse/stack.apply.json
      - STACK_ALLOWED_INGEST_PORTS=${STACK_ALLOWED_INGEST_PORTS:-8010,8011}
      - STACK_APPLY_TIMEOUT_S=${STACK_APPLY_TIMEOUT_S:-120}
    volumes:
      - ./emergency-audio:/emergency-audio
      - ./stack-config:/etc/sonicverse
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - streaming
    depends_on:
      app:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - cd /opt/sonicverse/status-api && exec gunicorn --bind 0.0.0.0:8080 --workers 2 --timeout 30 server:app
    restart: unless-stopped

  nginx-acme:
    image: nginx:1.28.3-alpine-slim
    profiles: ["acme-bootstrap"]
    ports:
      - "80:80"
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./infrastructure/nginx/acme-bootstrap.conf:/etc/nginx/conf.d/default.conf:ro

  certbot:
    image: certbot/certbot
    container_name: sonicverse-certbot
    env_file:
      - .env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    environment:
      - HOSTNAME=${ICECAST_HOSTNAME}
      - EMAIL=${STATION_ADMIN_EMAIL:-admin@example.com}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -z "$(printenv ICECAST_HOSTNAME)" ]; then
          echo "ICECAST_HOSTNAME must be set" >&2
          exit 1
        fi

        if [ ! -d "/etc/letsencrypt/live/$(printenv ICECAST_HOSTNAME)" ]; then
          echo "certbot: No cert for $(printenv ICECAST_HOSTNAME) - attempting initial issuance"
          certbot certonly \
            --non-interactive \
            --agree-tos \
            --email "$(printenv STATION_ADMIN_EMAIL)" \
            --webroot \
            -w /var/www/certbot \
            -d "$(printenv ICECAST_HOSTNAME)" \
            || echo "Initial issuance failed"
          printf "%s\n" "$(date -u +%s)" > /etc/letsencrypt/.nginx-reload || true
        fi

        trap exit TERM
        while :; do
          certbot renew --quiet --deploy-hook 'printf "%s\n" "$(date -u +%s)" > /etc/letsencrypt/.nginx-reload'
          sleep 12h & wait
        done
    depends_on:
      app:
        condition: service_healthy
    networks:
      - streaming
    restart: unless-stopped

volumes:
  hls-data:
  icecast-logs:

networks:
  streaming:
    driver: bridge
